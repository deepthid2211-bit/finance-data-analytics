name: 'finance_analytics'
version: '1.0.0'
config-version: 2

profile: 'finance_analytics'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  finance_analytics:
    staging:
      +materialized: view
      +schema: staging
    bronze:
      +materialized: view
      +schema: bronze
    silver:
      +materialized: incremental
      +schema: silver
      +unique_key: "surrogate_key"
    gold:
      +materialized: table
      +schema: gold
    marts:
      +materialized: view
      +schema: marts
